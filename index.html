<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinuteMen Softball</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--blue:#0d47a1;--blue-dark:#002171;--blue-light:#e3f0fb;--green:#388e3c;--red:#c62828;--red-light:#ffcdd2;--gold:#f9a825;--gold-light:#fff8e1;--bg:#f0f4f8;--white:#fff;--text:#1a2a3a;--text-light:#6b7c93;--border:#d0dae6;--shadow:0 2px 12px rgba(0,0,0,.10);--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* PIN */
#screen-pin{background:#f4f7fb;align-items:center;justify-content:center;}
.pin-box{text-align:center;width:100%;max-width:340px;padding:20px;}
.pin-logo{font-size:48px;margin-bottom:8px;}
.pin-title{color:var(--blue);font-size:26px;font-weight:800;margin-bottom:4px;}
.pin-sub{color:var(--text-light);font-size:14px;margin-bottom:24px;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:28px;}
.pin-dot{width:18px;height:18px;border-radius:50%;background:#d0dae6;border:2px solid #b0bec5;transition:background .15s;}
.pin-dot.filled{background:var(--blue);border-color:var(--blue);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.pin-key{background:white;border:1.5px solid var(--border);border-radius:14px;padding:18px 0;font-size:22px;font-weight:700;cursor:pointer;color:var(--text);box-shadow:0 2px 6px rgba(0,0,0,.07);transition:background .1s,transform .08s;user-select:none;}
.pin-key:active{background:#e3f0fb;transform:scale(.95);}
.pin-key.zero{grid-column:2;}
.pin-key.backspace{color:var(--text-light);font-size:18px;}
.pin-error{color:var(--red);font-size:13px;margin-top:14px;min-height:20px;}

/* NAV */
.top-nav{background:var(--blue);color:white;padding:12px 18px;display:flex;align-items:center;gap:10px;min-height:56px;}
.back-btn{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:2px 8px;line-height:1;}
.nav-title{font-size:17px;font-weight:700;}
.nav-sub{font-size:12px;opacity:.8;}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.bottom-nav{position:sticky;bottom:0;background:white;border-top:1px solid var(--border);display:flex;z-index:100;}
.bottom-nav button{flex:1;padding:10px 0 6px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:var(--text-light);font-weight:500;}
.bottom-nav button.active{color:var(--blue);}
.bnav-icon{font-size:22px;}
.content{flex:1;overflow-y:auto;}
.content-inner{max-width:700px;margin:0 auto;padding:18px 14px 90px;}

/* CARDS */
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
.card-label{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.section-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.section-header{padding:14px 18px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.sh-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-light);}

/* BUTTONS */
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);opacity:.9;}
.btn:last-child{margin-bottom:0;}
.btn-primary{background:var(--blue);color:white;}
.btn-green{background:var(--green);color:white;}
.btn-outline{background:white;border:1.5px solid var(--border);color:var(--text);}
.btn-red{background:var(--red);color:white;}
.btn-sm{width:auto;padding:7px 14px;font-size:13px;border-radius:9px;margin-bottom:0;}
.btn-gold{background:var(--gold);color:#1a2a3a;}

/* GAME CARDS */
.game-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;cursor:pointer;transition:transform .1s;}
.game-card:active{transform:scale(.99);}
.game-card-header{background:var(--blue);color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.game-card-title{font-size:16px;font-weight:800;}
.game-card-sub{font-size:12px;opacity:.85;}
.game-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.badge-home{background:#e8f5e9;color:#2e7d32;}
.badge-away{background:var(--blue-light);color:var(--blue);}
.badge-final{background:#f3e5f5;color:#6a1b9a;}
.badge-cancelled{background:#f5f5f5;color:#616161;}
.game-card-body{padding:14px 16px;}
.game-info-row{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:6px;color:var(--text-light);}
.game-score{font-size:22px;font-weight:800;color:var(--text);}
.score-sep{font-size:16px;font-weight:400;color:var(--text-light);margin:0 4px;}
.win-score{color:var(--green);}
.loss-score{color:var(--red);}

/* STATS TABLE */
.stats-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stats-table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px;}
.stats-table th{background:var(--blue);color:white;padding:8px 10px;text-align:center;font-size:12px;font-weight:700;white-space:nowrap;}
.stats-table th:first-child{text-align:left;min-width:110px;}
.stats-table td{padding:8px 10px;text-align:center;border-bottom:1px solid #f0f4f8;}
.stats-table td:first-child{text-align:left;font-weight:700;color:var(--blue);}
.stats-table tr:last-child td{border-bottom:none;}
.stats-table tr.my-row td{background:#e8f5e9;}
.avg-great{color:#2e7d32;font-weight:800;}
.avg-good{color:#388e3c;font-weight:700;}
.avg-ok{color:#f9a825;font-weight:700;}
.avg-poor{color:var(--red);}

/* AT-BAT RESULT BUTTONS */
.ab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.ab-btn{padding:18px 8px;border:2px solid transparent;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;text-align:center;background:white;box-shadow:var(--shadow);}
.ab-btn:active{transform:scale(.96);}
.ab-btn.selected{border-width:3px;}
.ab-1b{border-color:#81c784;color:#2e7d32;background:#f1f8e9;}
.ab-1b.selected{background:#c8e6c9;border-color:#2e7d32;}
.ab-2b{border-color:#64b5f6;color:#1565c0;background:#e3f0fb;}
.ab-2b.selected{background:#bbdefb;border-color:#1565c0;}
.ab-3b{border-color:#ce93d8;color:#6a1b9a;background:#f3e5f5;}
.ab-3b.selected{background:#e1bee7;border-color:#6a1b9a;}
.ab-hr{border-color:#ffb74d;color:#e65100;background:#fff8f0;}
.ab-hr.selected{background:#ffe0b2;border-color:#e65100;}
.ab-bb{border-color:#4fc3f7;color:#01579b;background:#e1f5fe;}
.ab-bb.selected{background:#b3e5fc;border-color:#01579b;}
.ab-k{border-color:#e57373;color:#b71c1c;background:#ffebee;}
.ab-k.selected{background:#ffcdd2;border-color:#b71c1c;}
.ab-sf{border-color:#ffd54f;color:#f57f17;background:#fffde7;}
.ab-sf.selected{background:#fff9c4;border-color:#f57f17;}
.ab-fc{border-color:#90a4ae;color:#37474f;background:#f5f7f8;}
.ab-fc.selected{background:#cfd8dc;border-color:#37474f;}
.ab-out{border-color:#e0e0e0;color:#616161;background:white;}
.ab-out.selected{background:#eeeeee;border-color:#616161;}
.ab-result-label{font-size:11px;font-weight:400;opacity:.75;margin-top:2px;}

/* RBI COUNTER */
.rbi-counter{display:flex;align-items:center;justify-content:center;gap:16px;margin:12px 0;}
.rbi-btn{width:44px;height:44px;border-radius:50%;border:none;font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.rbi-minus{background:#ffebee;color:var(--red);}
.rbi-plus{background:#e8f5e9;color:var(--green);}
.rbi-val{font-size:32px;font-weight:800;min-width:40px;text-align:center;color:var(--text);}

/* LINEUP */
.lineup-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f4f8;gap:10px;}
.lineup-row:last-child{border-bottom:none;}
.lineup-num{font-size:18px;font-weight:800;color:var(--blue);width:28px;flex-shrink:0;}
.lineup-name{flex:1;font-size:15px;font-weight:600;}
.lineup-pos{font-size:12px;font-weight:700;background:var(--blue-light);color:var(--blue);padding:3px 8px;border-radius:10px;}

/* ROSTER */
.roster-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f4f8;gap:10px;}
.roster-row:last-child{border-bottom:none;}
.roster-num{font-size:12px;font-weight:700;background:var(--blue-light);color:var(--blue);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.roster-name{flex:1;font-size:15px;font-weight:600;}
.roster-pin{font-size:12px;color:var(--text-light);letter-spacing:3px;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:var(--text-light);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;outline:none;background:white;color:var(--text);font-family:inherit;}
.form-input:focus{border-color:var(--blue);}
.form-select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;outline:none;background:white;color:var(--text);font-family:inherit;cursor:pointer;}
.form-select:focus{border-color:var(--blue);}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px 36px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px;}

/* LOADING */
#screen-loading{background:var(--bg);align-items:center;justify-content:center;gap:16px;}
.app-spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2a3a;color:white;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-msg{font-size:15px;font-weight:600;}
.empty-sub{font-size:13px;margin-top:6px;}

/* ADMIN LINEUP EDITOR */
.lineup-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.lineup-edit-num{font-size:14px;font-weight:800;color:var(--blue);width:24px;flex-shrink:0;text-align:center;}
.lineup-edit-sel{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;background:white;color:var(--text);outline:none;}
.lineup-edit-sel:focus{border-color:var(--blue);}
.lineup-edit-pos{width:90px;border:1.5px solid var(--border);border-radius:8px;padding:8px 6px;font-size:13px;background:white;color:var(--text);outline:none;}

/* SCHEDULE ROW */
.sched-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f4f8;gap:10px;cursor:pointer;transition:background .1s;}
.sched-row:last-child{border-bottom:none;}
.sched-row:active{background:#f5f7f9;}
.sched-date-col{font-size:13px;color:var(--text-light);width:68px;flex-shrink:0;}
.sched-opp{flex:1;font-size:14px;font-weight:600;}
.sched-score{font-size:13px;font-weight:700;}

/* DARK MODE */
body.dark{--bg:#0f1923;--text:#e8f0fe;--text-light:#8fa3c0;--border:#2a3a50;--shadow:0 2px 12px rgba(0,0,0,.4);--white:#1a2535;--blue-light:#1a3050;}
body.dark .card,body.dark .section-card,body.dark .game-card,body.dark .modal,body.dark .pin-key,body.dark .bottom-nav,body.dark .ab-btn{background:#1a2535;}
body.dark .form-input,body.dark .form-select,body.dark .lineup-edit-sel,body.dark .lineup-edit-pos{background:#1a2535;color:#e8f0fe;border-color:#2a3a50;}
body.dark .stats-table td{border-color:#1e2f45;}
body.dark .btn-outline{background:#1e2f45;color:#e8f0fe;border-color:#2a3a50;}
body.dark .bottom-nav{background:#1a2535;border-color:#2a3a50;}
body.dark .game-card-body{background:#1a2535;}
body.dark .lineup-row,body.dark .roster-row,body.dark .sched-row{border-color:#1e2f45;}
@media(max-width:480px){.content-inner{padding:14px 10px 90px;}.ab-grid{grid-template-columns:repeat(3,1fr);gap:8px;}.ab-btn{padding:14px 4px;font-size:14px;}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOADING -->
<div class="screen active" id="screen-loading">
  <div class="app-spinner"></div>
  <div style="color:var(--text-light);font-size:14px;">Loading…</div>
</div>

<!-- PIN -->
<div class="screen" id="screen-pin">
  <div class="pin-box">
    <div class="pin-logo">⚾</div>
    <div class="pin-title" id="pin-team-name">MinuteMen</div>
    <div class="pin-sub" id="pin-season-sub">Enter your PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key zero" onclick="pinKey('0')">0</button>
      <button class="pin-key backspace" onclick="pinBack()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- PLAYER HOME -->
<div class="screen" id="screen-home">
  <div class="top-nav">
    <span style="font-size:22px;">⚾</span>
    <div>
      <div class="nav-title" id="home-team-name">MinuteMen</div>
      <div class="nav-sub" id="home-player-name"></div>
    </div>
    <div class="nav-right">
      <button style="background:none;border:none;color:white;font-size:22px;cursor:pointer;" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:white;border:none;" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="content" id="home-content">
    <div id="tab-home" class="content-inner"></div>
    <div id="tab-schedule" class="content-inner" style="display:none;"></div>
    <div id="tab-stats" class="content-inner" style="display:none;"></div>
  </div>
  <div class="bottom-nav">
    <button class="active" onclick="switchTab('home',this)" id="btn-tab-home">
      <span class="bnav-icon">🏠</span>Home
    </button>
    <button onclick="switchTab('schedule',this)" id="btn-tab-schedule">
      <span class="bnav-icon">📅</span>Schedule
    </button>
    <button onclick="switchTab('stats',this)" id="btn-tab-stats">
      <span class="bnav-icon">📊</span>Stats
    </button>
  </div>
</div>

<!-- GAME DETAIL -->
<div class="screen" id="screen-game">
  <div class="top-nav">
    <button class="back-btn" onclick="showScreen('screen-home')">←</button>
    <div>
      <div class="nav-title" id="gd-title">Game Detail</div>
      <div class="nav-sub" id="gd-sub"></div>
    </div>
    <div class="nav-right" id="gd-log-btn-wrap"></div>
  </div>
  <div class="content">
    <div class="content-inner" id="game-detail-content"></div>
  </div>
</div>

<!-- LOG AT-BAT -->
<div class="screen" id="screen-log-ab">
  <div class="top-nav">
    <button class="back-btn" id="log-ab-back">←</button>
    <div>
      <div class="nav-title" id="log-ab-player-name">Log At-Bat</div>
      <div class="nav-sub" id="log-ab-game-name"></div>
    </div>
  </div>
  <div class="content">
    <div class="content-inner">
      <div class="card">
        <div class="card-label">Result</div>
        <div class="ab-grid">
          <button class="ab-btn ab-1b" onclick="selectResult('single')">
            1B<div class="ab-result-label">Single</div>
          </button>
          <button class="ab-btn ab-2b" onclick="selectResult('double')">
            2B<div class="ab-result-label">Double</div>
          </button>
          <button class="ab-btn ab-3b" onclick="selectResult('triple')">
            3B<div class="ab-result-label">Triple</div>
          </button>
          <button class="ab-btn ab-hr" onclick="selectResult('hr')">
            HR<div class="ab-result-label">Home Run</div>
          </button>
          <button class="ab-btn ab-bb" onclick="selectResult('bb')">
            BB<div class="ab-result-label">Walk</div>
          </button>
          <button class="ab-btn ab-k" onclick="selectResult('k')">
            K<div class="ab-result-label">Strikeout</div>
          </button>
          <button class="ab-btn ab-sf" onclick="selectResult('sf')">
            SF<div class="ab-result-label">Sac Fly</div>
          </button>
          <button class="ab-btn ab-fc" onclick="selectResult('fc')">
            FC<div class="ab-result-label">Fielder's Choice</div>
          </button>
          <button class="ab-btn ab-out" onclick="selectResult('out')">
            OUT<div class="ab-result-label">Out</div>
          </button>
        </div>
      </div>
      <div class="card" id="rbi-card">
        <div class="card-label">RBI</div>
        <div class="rbi-counter">
          <button class="rbi-btn rbi-minus" onclick="adjustRbi(-1)">−</button>
          <div class="rbi-val" id="rbi-val">0</div>
          <button class="rbi-btn rbi-plus" onclick="adjustRbi(1)">+</button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">Inning (optional)</div>
        <select class="form-select" id="ab-inning">
          <option value="">—</option>
          <option value="1">1st</option>
          <option value="2">2nd</option>
          <option value="3">3rd</option>
          <option value="4">4th</option>
          <option value="5">5th</option>
          <option value="6">6th</option>
          <option value="7">7th</option>
          <option value="8">8th</option>
          <option value="9">9th</option>
        </select>
      </div>
      <div id="log-ab-error" style="color:var(--red);font-size:13px;margin-bottom:10px;"></div>
      <button class="btn btn-green" onclick="saveAtBat()">Save At-Bat</button>
    </div>
  </div>
</div>

<!-- ADMIN HOME -->
<div class="screen" id="screen-admin">
  <div class="top-nav">
    <span style="font-size:22px;">⚾</span>
    <div>
      <div class="nav-title" id="admin-team-name">MinuteMen</div>
      <div class="nav-sub">Admin</div>
    </div>
    <div class="nav-right">
      <button style="background:none;border:none;color:white;font-size:22px;cursor:pointer;" onclick="toggleDark()">🌙</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:white;border:none;" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="content" id="admin-content">
    <div id="atab-roster" class="content-inner"></div>
    <div id="atab-games" class="content-inner" style="display:none;"></div>
    <div id="atab-lineup" class="content-inner" style="display:none;"></div>
    <div id="atab-settings" class="content-inner" style="display:none;"></div>
  </div>
  <div class="bottom-nav">
    <button class="active" onclick="switchAdminTab('roster',this)">
      <span class="bnav-icon">👥</span>Roster
    </button>
    <button onclick="switchAdminTab('games',this)">
      <span class="bnav-icon">📅</span>Games
    </button>
    <button onclick="switchAdminTab('lineup',this)">
      <span class="bnav-icon">📋</span>Lineup
    </button>
    <button onclick="switchAdminTab('settings',this)">
      <span class="bnav-icon">⚙️</span>Settings
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = '%%SUPABASE_URL%%';
const SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ────────────────────────────────────────────────────────
let currentPlayer = null;
let isAdmin = false;
let players = [], games = [], lineups = [], atBats = [], config = {};
let pinBuffer = '';
let logAbGameId = null, selectedResult = null, rbiCount = 0;
let currentGameId = null;

const POSITIONS = ['P','C','1B','2B','3B','SS','LF','LCF','RCF','RF','EH','DH'];
const AB_RESULTS = ['single','double','triple','hr','k','fc','out'];
const H_RESULTS  = ['single','double','triple','hr'];

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  await loadData();
  showScreen('screen-pin');
  document.getElementById('pin-team-name').textContent = config.team_name || 'MinuteMen';
  document.getElementById('pin-season-sub').textContent = (config.season || '') + ' Season · Enter your PIN';
  if (localStorage.getItem('darkMode') === '1') document.body.classList.add('dark');
}

async function loadData() {
  const [cfgRes, plrRes, gmsRes, lupRes, absRes] = await Promise.all([
    sb.from('sb_config').select('*'),
    sb.from('sb_players').select('*').order('name'),
    sb.from('sb_games').select('*').order('game_date'),
    sb.from('sb_lineups').select('*').order('batting_order'),
    sb.from('sb_at_bats').select('*')
  ]);
  config   = Object.fromEntries((cfgRes.data || []).map(r => [r.key, r.value]));
  players  = plrRes.data  || [];
  games    = gmsRes.data  || [];
  lineups  = lupRes.data  || [];
  atBats   = absRes.data  || [];
}

// ── Screens ──────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(tab, btn) {
  ['home','schedule','stats'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
    document.getElementById('btn-tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'home')     renderHomeTab();
  if (tab === 'schedule') renderScheduleTab();
  if (tab === 'stats')    renderStatsTab();
}

function switchAdminTab(tab, btn) {
  ['roster','games','lineup','settings'].forEach(t => {
    document.getElementById('atab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('#screen-admin .bottom-nav button').forEach((b,i) => {
    b.classList.toggle('active', b === btn);
  });
  if (tab === 'roster')   renderAdminRoster();
  if (tab === 'games')    renderAdminGames();
  if (tab === 'lineup')   renderAdminLineup();
  if (tab === 'settings') renderAdminSettings();
}

function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', document.body.classList.contains('dark') ? '1' : '0');
}

function logout() {
  currentPlayer = null; isAdmin = false; pinBuffer = '';
  updatePinDots();
  showScreen('screen-pin');
}

// ── PIN ──────────────────────────────────────────────────────────
function pinKey(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 120);
}

function pinBack() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

function updatePinDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('pd' + i).classList.toggle('filled', i < pinBuffer.length);
}

function checkPin() {
  const adminPin = config.admin_pin || '0000';
  if (pinBuffer === adminPin) {
    isAdmin = true; currentPlayer = null;
    document.getElementById('admin-team-name').textContent = config.team_name || 'MinuteMen';
    showScreen('screen-admin');
    renderAdminRoster();
    pinBuffer = ''; updatePinDots();
    return;
  }
  const player = players.filter(p => p.active).find(p => p.pin === pinBuffer);
  if (player) {
    currentPlayer = player; isAdmin = false;
    document.getElementById('home-team-name').textContent = config.team_name || 'MinuteMen';
    document.getElementById('home-player-name').textContent = player.name + (player.number ? '  #' + player.number : '');
    showScreen('screen-home');
    switchTab('home', document.getElementById('btn-tab-home'));
    pinBuffer = ''; updatePinDots();
    return;
  }
  document.getElementById('pin-error').textContent = 'Incorrect PIN — try again';
  pinBuffer = ''; updatePinDots();
}

// ── Stats Calc ───────────────────────────────────────────────────
function calcStats(abs) {
  const ab  = abs.filter(a => AB_RESULTS.includes(a.result)).length;
  const s1  = abs.filter(a => a.result === 'single').length;
  const d2  = abs.filter(a => a.result === 'double').length;
  const t3  = abs.filter(a => a.result === 'triple').length;
  const hr  = abs.filter(a => a.result === 'hr').length;
  const h   = s1 + d2 + t3 + hr;
  const bb  = abs.filter(a => a.result === 'bb').length;
  const k   = abs.filter(a => a.result === 'k').length;
  const sf  = abs.filter(a => a.result === 'sf').length;
  const fc  = abs.filter(a => a.result === 'fc').length;
  const rbi = abs.reduce((s, a) => s + (a.rbi || 0), 0);
  const tb  = s1 + 2*d2 + 3*t3 + 4*hr;
  const fmt = n => n.toFixed(3).replace(/^0\./, '.');
  const avg = ab > 0 ? fmt(h / ab) : '.---';
  const obpDen = ab + bb + sf;
  const obp = obpDen > 0 ? fmt((h + bb + sf) / obpDen) : '.---';
  const slg = ab > 0 ? fmt(tb / ab) : '.---';
  const ops = (avg === '.---' || obp === '.---') ? '.---'
    : fmt(parseFloat('0' + obp) + parseFloat('0' + slg));
  return { ab, h, s1, d2, t3, hr, bb, k, sf, fc, rbi, tb, avg, obp, slg, ops };
}

function avgClass(avg) {
  if (avg === '.---') return '';
  const v = parseFloat('0' + avg);
  if (v >= 0.400) return 'avg-great';
  if (v >= 0.300) return 'avg-good';
  if (v >= 0.200) return 'avg-ok';
  return 'avg-poor';
}

// ── Home Tab ─────────────────────────────────────────────────────
function renderHomeTab() {
  const el = document.getElementById('tab-home');
  const today = new Date().toISOString().slice(0, 10);
  const upcoming = games.filter(g => g.status === 'scheduled' && g.game_date >= today)
                        .sort((a,b) => a.game_date.localeCompare(b.game_date));
  const nextGame = upcoming[0] || null;
  const recent = games.filter(g => g.status === 'final')
                      .sort((a,b) => b.game_date.localeCompare(a.game_date))[0] || null;

  // Season summary for current player
  const myAbs = atBats.filter(a => a.player_id === currentPlayer.id);
  const myStats = calcStats(myAbs);

  let html = `<div class="card" style="background:var(--blue);color:white;margin-bottom:14px;">
    <div style="font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Season Stats</div>
    <div style="font-size:32px;font-weight:800;margin-bottom:4px;">${myStats.avg}</div>
    <div style="font-size:13px;opacity:.85;">${myStats.ab} AB · ${myStats.h} H · ${myStats.hr} HR · ${myStats.rbi} RBI</div>
  </div>`;

  if (nextGame) {
    const d = fmtDate(nextGame.game_date);
    const lineupForGame = lineups.filter(l => l.game_id === nextGame.id);
    const mySpot = lineupForGame.find(l => l.player_id === currentPlayer.id);
    html += `<div class="section-card">
      <div class="section-header">
        <span style="font-size:16px;">📅</span>
        <span class="sh-title">Next Game</span>
      </div>
      <div style="padding:16px;">
        <div style="font-size:18px;font-weight:800;margin-bottom:4px;">vs ${esc(nextGame.opponent)}</div>
        <div style="font-size:13px;color:var(--text-light);margin-bottom:12px;">${d} · <span class="game-badge ${nextGame.home_away === 'home' ? 'badge-home' : 'badge-away'}">${nextGame.home_away}</span>${nextGame.location ? ' · ' + esc(nextGame.location) : ''}</div>
        ${mySpot ? `<div style="font-size:14px;margin-bottom:14px;">🏏 Batting <strong>#${mySpot.batting_order}</strong>${mySpot.position ? ' · ' + mySpot.position : ''}</div>` : ''}
        <button class="btn btn-green" onclick="openLogAb(${nextGame.id})">⚾ Log At-Bat</button>
        <button class="btn btn-outline" onclick="openGameDetail(${nextGame.id})">View Lineup & Stats</button>
      </div>
    </div>`;
  } else {
    html += `<div class="section-card"><div class="section-header"><span class="sh-title">Next Game</span></div>
      <div class="empty-state"><div class="empty-icon">📅</div><div class="empty-msg">No upcoming games</div></div></div>`;
  }

  if (recent) {
    const won = recent.our_score > recent.opp_score;
    const lost = recent.our_score < recent.opp_score;
    html += `<div class="section-card" style="cursor:pointer;" onclick="openGameDetail(${recent.id})">
      <div class="section-header"><span style="font-size:16px;">${won ? '🏆' : '⚾'}</span><span class="sh-title">Last Game</span></div>
      <div style="padding:16px;">
        <div style="font-size:16px;font-weight:800;margin-bottom:4px;">vs ${esc(recent.opponent)}</div>
        <div style="font-size:13px;color:var(--text-light);margin-bottom:8px;">${fmtDate(recent.game_date)}</div>
        <div class="game-score">
          <span class="${won ? 'win-score' : lost ? 'loss-score' : ''}">${recent.our_score ?? '—'}</span>
          <span class="score-sep">–</span>
          <span class="${lost ? 'win-score' : won ? 'loss-score' : ''}">${recent.opp_score ?? '—'}</span>
        </div>
      </div>
    </div>`;
  }

  // Log AB for any recent game (last 7 days)
  const recentGames = games.filter(g => g.status === 'final' && daysDiff(g.game_date) <= 7);
  if (recentGames.length > 0 && nextGame) {
    html += `<div style="margin-top:8px;"><div class="card-label" style="margin-bottom:8px;">Log stats for a recent game</div>`;
    recentGames.forEach(g => {
      html += `<button class="btn btn-outline" style="margin-bottom:8px;" onclick="openLogAb(${g.id})">⚾ ${fmtDate(g.game_date)} vs ${esc(g.opponent)}</button>`;
    });
    html += '</div>';
  } else if (recentGames.length > 0 && !nextGame) {
    html += `<button class="btn btn-green" onclick="openLogAb(${recentGames[0].id})">⚾ Log At-Bat – ${fmtDate(recentGames[0].game_date)} vs ${esc(recentGames[0].opponent)}</button>`;
  }

  el.innerHTML = html;
}

// ── Schedule Tab ─────────────────────────────────────────────────
function renderScheduleTab() {
  const el = document.getElementById('tab-schedule');
  if (!games.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-msg">No games scheduled yet</div></div>';
    return;
  }
  const sorted = [...games].sort((a,b) => a.game_date.localeCompare(b.game_date));
  let html = '<div class="section-card"><div class="section-header"><span class="sh-title">Schedule</span></div>';
  sorted.forEach(g => {
    const scoreHtml = g.status === 'final'
      ? `<span class="sched-score ${g.our_score > g.opp_score ? 'win-score' : g.our_score < g.opp_score ? 'loss-score' : ''}">${g.our_score}–${g.opp_score}</span>`
      : `<span class="game-badge ${g.status === 'cancelled' ? 'badge-cancelled' : 'badge-' + g.home_away}">${g.status === 'cancelled' ? 'Cancelled' : g.home_away}</span>`;
    html += `<div class="sched-row" onclick="openGameDetail(${g.id})">
      <div class="sched-date-col">${fmtDateShort(g.game_date)}</div>
      <div class="sched-opp">vs ${esc(g.opponent)}</div>
      ${scoreHtml}
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Stats Tab ────────────────────────────────────────────────────
function renderStatsTab() {
  const el = document.getElementById('tab-stats');
  const activePlayers = players.filter(p => p.active);
  if (!activePlayers.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-msg">No players yet</div></div>';
    return;
  }

  const rows = activePlayers.map(p => {
    const pAbs = atBats.filter(a => a.player_id === p.id);
    return { p, stats: calcStats(pAbs) };
  }).sort((a,b) => {
    const va = parseFloat('0' + a.stats.avg) || 0;
    const vb = parseFloat('0' + b.stats.avg) || 0;
    return vb - va;
  });

  let html = `<div class="card-label" style="margin-bottom:8px;">Season · ${config.season || ''}</div>
  <div class="section-card"><div class="stats-table-wrap"><table class="stats-table">
  <thead><tr>
    <th>Player</th><th>AB</th><th>H</th><th>HR</th><th>RBI</th><th>BB</th><th>K</th><th>AVG</th><th>OBP</th><th>SLG</th>
  </tr></thead><tbody>`;

  rows.forEach(({ p, stats }) => {
    const isMe = currentPlayer && p.id === currentPlayer.id;
    html += `<tr class="${isMe ? 'my-row' : ''}">
      <td>${esc(p.name)}${p.number ? ' <span style="font-size:11px;color:var(--text-light);">#'+p.number+'</span>' : ''}</td>
      <td>${stats.ab}</td><td>${stats.h}</td><td>${stats.hr}</td><td>${stats.rbi}</td>
      <td>${stats.bb}</td><td>${stats.k}</td>
      <td class="${avgClass(stats.avg)}">${stats.avg}</td>
      <td>${stats.obp}</td><td>${stats.slg}</td>
    </tr>`;
  });

  html += '</tbody></table></div></div>';

  // Detail table: hit breakdown
  html += `<div class="section-card" style="margin-top:14px;"><div class="section-header"><span class="sh-title">Hit Breakdown</span></div>
  <div class="stats-table-wrap"><table class="stats-table">
  <thead><tr><th>Player</th><th>1B</th><th>2B</th><th>3B</th><th>HR</th><th>SF</th><th>FC</th><th>TB</th><th>OPS</th></tr></thead><tbody>`;
  rows.forEach(({ p, stats }) => {
    const isMe = currentPlayer && p.id === currentPlayer.id;
    html += `<tr class="${isMe ? 'my-row' : ''}">
      <td>${esc(p.name)}</td>
      <td>${stats.s1}</td><td>${stats.d2}</td><td>${stats.t3}</td><td>${stats.hr}</td>
      <td>${stats.sf}</td><td>${stats.fc}</td><td>${stats.tb}</td><td>${stats.ops}</td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';

  el.innerHTML = html;
}

// ── Game Detail ──────────────────────────────────────────────────
function openGameDetail(gameId) {
  currentGameId = gameId;
  const g = games.find(x => x.id === gameId);
  if (!g) return;
  document.getElementById('gd-title').textContent = 'vs ' + g.opponent;
  document.getElementById('gd-sub').textContent = fmtDate(g.game_date) + ' · ' + g.home_away;

  // Show log-ab button in nav if game is not cancelled
  const wrap = document.getElementById('gd-log-btn-wrap');
  if (!isAdmin && g.status !== 'cancelled') {
    wrap.innerHTML = `<button class="btn btn-sm btn-gold" onclick="openLogAb(${g.id})">⚾ Log AB</button>`;
  } else {
    wrap.innerHTML = '';
  }

  renderGameDetail(g);
  showScreen('screen-game');
}

function renderGameDetail(g) {
  const el = document.getElementById('game-detail-content');
  const gameLineup = lineups.filter(l => l.game_id === g.id)
                            .sort((a,b) => a.batting_order - b.batting_order);
  const gameAbs = atBats.filter(a => a.game_id === g.id);

  // Score card
  let html = `<div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
      <span class="game-badge ${g.home_away === 'home' ? 'badge-home' : 'badge-away'}">${g.home_away}</span>
      <span class="game-badge ${g.status === 'final' ? 'badge-final' : g.status === 'cancelled' ? 'badge-cancelled' : 'badge-home'}">${g.status}</span>
    </div>`;
  if (g.status === 'final' && g.our_score != null) {
    const won = g.our_score > g.opp_score;
    const lost = g.our_score < g.opp_score;
    html += `<div class="game-score">
      <span class="${won ? 'win-score' : lost ? 'loss-score' : ''}">${g.our_score}</span>
      <span class="score-sep">–</span>
      <span class="${lost ? 'win-score' : won ? 'loss-score' : ''}">${g.opp_score}</span>
    </div><div style="font-size:13px;font-weight:700;color:${won?'var(--green)':lost?'var(--red)':'var(--text-light)'};">${won?'Win':lost?'Loss':'Tie'}</div>`;
  }
  if (g.location) html += `<div style="font-size:13px;color:var(--text-light);margin-top:8px;">📍 ${esc(g.location)}</div>`;
  if (g.notes) html += `<div style="font-size:13px;color:var(--text-light);margin-top:4px;">${esc(g.notes)}</div>`;
  html += '</div>';

  // Lineup
  html += `<div class="section-card"><div class="section-header"><span style="font-size:16px;">📋</span><span class="sh-title">Batting Order</span></div>`;
  if (gameLineup.length) {
    gameLineup.forEach(l => {
      const p = players.find(x => x.id === l.player_id);
      const isMe = currentPlayer && l.player_id === currentPlayer.id;
      html += `<div class="lineup-row" ${isMe ? 'style="background:#e8f5e9;"' : ''}>
        <div class="lineup-num">${l.batting_order}</div>
        <div class="lineup-name">${p ? esc(p.name) : '—'}${p?.number ? ' <span style="font-size:12px;color:var(--text-light);">#'+p.number+'</span>' : ''}</div>
        ${l.position ? `<div class="lineup-pos">${esc(l.position)}</div>` : ''}
      </div>`;
    });
  } else {
    html += '<div class="empty-state" style="padding:20px;"><div class="empty-msg">Lineup not set yet</div></div>';
  }
  html += '</div>';

  // Per-game stats
  const playersWithAbs = players.filter(p => gameAbs.some(a => a.player_id === p.id));
  if (playersWithAbs.length) {
    html += `<div class="section-card"><div class="section-header"><span style="font-size:16px;">📊</span><span class="sh-title">Game Stats</span></div>
    <div class="stats-table-wrap"><table class="stats-table">
    <thead><tr><th>Player</th><th>AB</th><th>H</th><th>HR</th><th>RBI</th><th>BB</th><th>AVG</th></tr></thead><tbody>`;
    playersWithAbs.forEach(p => {
      const pAbs = gameAbs.filter(a => a.player_id === p.id);
      const st = calcStats(pAbs);
      const isMe = currentPlayer && p.id === currentPlayer.id;
      html += `<tr class="${isMe ? 'my-row' : ''}">
        <td>${esc(p.name)}</td>
        <td>${st.ab}</td><td>${st.h}</td><td>${st.hr}</td><td>${st.rbi}</td><td>${st.bb}</td>
        <td class="${avgClass(st.avg)}">${st.avg}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';

    // At-bat log for current player
    if (currentPlayer) {
      const myAbs = gameAbs.filter(a => a.player_id === currentPlayer.id);
      if (myAbs.length) {
        html += `<div class="section-card"><div class="section-header"><span class="sh-title">Your At-Bats</span></div><div style="padding:12px 16px;">`;
        myAbs.forEach((a, i) => {
          const resultLabel = { single:'Single',double:'Double',triple:'Triple',hr:'Home Run',bb:'Walk',k:'Strikeout',sf:'Sac Fly',fc:"Fielder's Choice",out:'Out' }[a.result] || a.result;
          html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f4f8;">
            <span style="font-size:13px;color:var(--text-light);width:24px;">${i+1}</span>
            <span style="flex:1;font-size:14px;font-weight:600;">${resultLabel}</span>
            ${a.rbi ? `<span style="font-size:12px;font-weight:700;background:#f3e5f5;color:#6a1b9a;padding:2px 8px;border-radius:10px;">${a.rbi} RBI</span>` : ''}
            ${a.inning ? `<span style="font-size:12px;color:var(--text-light);">Inn ${a.inning}</span>` : ''}
            <button style="background:#ffebee;border:none;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--red);" onclick="deleteAtBat(${a.id})">✕</button>
          </div>`;
        });
        html += '</div></div>';
      }
    }
  }

  el.innerHTML = html;
}

// ── Log At-Bat ───────────────────────────────────────────────────
function openLogAb(gameId) {
  logAbGameId = gameId; selectedResult = null; rbiCount = 0;
  const g = games.find(x => x.id === gameId);
  document.getElementById('log-ab-player-name').textContent = currentPlayer ? currentPlayer.name : 'Log At-Bat';
  document.getElementById('log-ab-game-name').textContent = g ? `vs ${g.opponent} · ${fmtDate(g.game_date)}` : '';
  document.getElementById('rbi-val').textContent = '0';
  document.getElementById('ab-inning').value = '';
  document.getElementById('log-ab-error').textContent = '';
  document.querySelectorAll('.ab-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('log-ab-back').onclick = () => {
    currentGameId ? openGameDetail(currentGameId) : showScreen('screen-home');
  };
  showScreen('screen-log-ab');
}

function selectResult(result) {
  selectedResult = result;
  document.querySelectorAll('.ab-btn').forEach(b => b.classList.remove('selected'));
  const map = {single:'ab-1b',double:'ab-2b',triple:'ab-3b',hr:'ab-hr',bb:'ab-bb',k:'ab-k',sf:'ab-sf',fc:'ab-fc',out:'ab-out'};
  document.querySelectorAll('.' + map[result]).forEach(b => b.classList.add('selected'));
  document.getElementById('log-ab-error').textContent = '';
}

function adjustRbi(delta) {
  rbiCount = Math.max(0, Math.min(10, rbiCount + delta));
  document.getElementById('rbi-val').textContent = rbiCount;
}

async function saveAtBat() {
  if (!selectedResult) {
    document.getElementById('log-ab-error').textContent = 'Please select a result';
    return;
  }
  const inning = document.getElementById('ab-inning').value;
  const { error } = await sb.from('sb_at_bats').insert({
    game_id: logAbGameId,
    player_id: currentPlayer.id,
    result: selectedResult,
    rbi: rbiCount,
    inning: inning ? parseInt(inning) : null
  });
  if (error) { showToast('Error saving — try again'); return; }
  showToast('At-bat saved!');
  await loadData();
  if (currentGameId === logAbGameId) {
    openGameDetail(currentGameId);
  } else {
    showScreen('screen-home');
    switchTab('home', document.getElementById('btn-tab-home'));
  }
}

async function deleteAtBat(id) {
  if (!confirm('Remove this at-bat?')) return;
  await sb.from('sb_at_bats').delete().eq('id', id);
  showToast('At-bat removed');
  await loadData();
  if (currentGameId) renderGameDetail(games.find(g => g.id === currentGameId));
}

// ── Admin: Roster ────────────────────────────────────────────────
function renderAdminRoster() {
  const el = document.getElementById('atab-roster');
  const activePlayers = players.filter(p => p.active);
  let html = `<button class="btn btn-primary" onclick="openPlayerModal()">+ Add Player</button>`;
  if (!activePlayers.length) {
    html += '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-msg">No players yet</div><div class="empty-sub">Add players to get started</div></div>';
  } else {
    html += '<div class="section-card">';
    activePlayers.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
      html += `<div class="roster-row">
        <div class="roster-num">${p.number || '—'}</div>
        <div class="roster-name">${esc(p.name)}</div>
        <div class="roster-pin">${p.pin}</div>
        <button class="btn btn-sm btn-outline" style="margin-left:8px;" onclick="openPlayerModal(${p.id})">Edit</button>
      </div>`;
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function openPlayerModal(playerId) {
  const modal = document.getElementById('modal-player');
  const p = playerId ? players.find(x => x.id === playerId) : null;
  document.getElementById('modal-player-title').textContent = p ? 'Edit Player' : 'Add Player';
  document.getElementById('edit-player-id').value = p ? p.id : '';
  document.getElementById('player-name-inp').value = p ? p.name : '';
  document.getElementById('player-num-inp').value = p ? (p.number || '') : '';
  document.getElementById('player-pin-inp').value = p ? p.pin : '';
  document.getElementById('del-player-btn').style.display = p ? '' : 'none';
  modal.classList.add('open');
}

async function savePlayer() {
  const id = document.getElementById('edit-player-id').value;
  const name = document.getElementById('player-name-inp').value.trim();
  const number = document.getElementById('player-num-inp').value.trim();
  const pin = document.getElementById('player-pin-inp').value.trim();
  if (!name || !pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
    showToast('Name and 4-digit PIN required'); return;
  }
  if (id) {
    await sb.from('sb_players').update({ name, number, pin }).eq('id', parseInt(id));
  } else {
    await sb.from('sb_players').insert({ name, number, pin, active: true });
  }
  closeModal('modal-player');
  await loadData();
  renderAdminRoster();
  showToast('Player saved');
}

async function deletePlayer() {
  const id = parseInt(document.getElementById('edit-player-id').value);
  if (!confirm('Remove this player from the roster?')) return;
  await sb.from('sb_players').update({ active: false }).eq('id', id);
  closeModal('modal-player');
  await loadData();
  renderAdminRoster();
  showToast('Player removed');
}

// ── Admin: Games ─────────────────────────────────────────────────
function renderAdminGames() {
  const el = document.getElementById('atab-games');
  const sorted = [...games].sort((a,b) => a.game_date.localeCompare(b.game_date));
  let html = `<button class="btn btn-primary" onclick="openGameModal()">+ Add Game</button>`;
  if (!sorted.length) {
    html += '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-msg">No games yet</div></div>';
  } else {
    html += '<div class="section-card">';
    sorted.forEach(g => {
      const scoreStr = g.status === 'final' ? ` · ${g.our_score}–${g.opp_score}` : '';
      html += `<div class="sched-row" onclick="openGameModal(${g.id})">
        <div class="sched-date-col">${fmtDateShort(g.game_date)}</div>
        <div class="sched-opp">vs ${esc(g.opponent)}</div>
        <span class="game-badge ${g.status==='final'?'badge-final':g.status==='cancelled'?'badge-cancelled':'badge-'+g.home_away}">${g.status==='final'?'Final'+scoreStr:g.status==='cancelled'?'Cancelled':g.home_away}</span>
      </div>`;
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function openGameModal(gameId) {
  const modal = document.getElementById('modal-game');
  const g = gameId ? games.find(x => x.id === gameId) : null;
  document.getElementById('modal-game-title').textContent = g ? 'Edit Game' : 'Add Game';
  document.getElementById('edit-game-id').value = g ? g.id : '';
  document.getElementById('game-opp-inp').value = g ? g.opponent : '';
  document.getElementById('game-date-inp').value = g ? g.game_date : '';
  document.getElementById('game-ha-inp').value = g ? g.home_away : 'home';
  document.getElementById('game-loc-inp').value = g ? (g.location || '') : '';
  document.getElementById('game-notes-inp').value = g ? (g.notes || '') : '';
  document.getElementById('game-our-inp').value = g ? (g.our_score ?? '') : '';
  document.getElementById('game-opp-score-inp').value = g ? (g.opp_score ?? '') : '';
  document.getElementById('game-status-inp').value = g ? g.status : 'scheduled';
  document.getElementById('score-row').style.display = g ? '' : 'none';
  document.getElementById('status-row').style.display = g ? '' : 'none';
  document.getElementById('del-game-btn').style.display = g ? '' : 'none';
  modal.classList.add('open');
}

async function saveGame() {
  const id = document.getElementById('edit-game-id').value;
  const opponent = document.getElementById('game-opp-inp').value.trim();
  const game_date = document.getElementById('game-date-inp').value;
  const home_away = document.getElementById('game-ha-inp').value;
  const location = document.getElementById('game-loc-inp').value.trim();
  const notes = document.getElementById('game-notes-inp').value.trim();
  const ourScore = document.getElementById('game-our-inp').value;
  const oppScore = document.getElementById('game-opp-score-inp').value;
  const status = document.getElementById('game-status-inp').value;
  if (!opponent || !game_date) { showToast('Opponent and date required'); return; }
  const data = { opponent, game_date, home_away, location: location || null, notes: notes || null,
    our_score: ourScore !== '' ? parseInt(ourScore) : null,
    opp_score: oppScore !== '' ? parseInt(oppScore) : null,
    status };
  if (id) {
    await sb.from('sb_games').update(data).eq('id', parseInt(id));
  } else {
    await sb.from('sb_games').insert(data);
  }
  closeModal('modal-game');
  await loadData();
  renderAdminGames();
  showToast('Game saved');
}

async function deleteGame() {
  const id = parseInt(document.getElementById('edit-game-id').value);
  if (!confirm('Delete this game and all its stats?')) return;
  await sb.from('sb_games').delete().eq('id', id);
  closeModal('modal-game');
  await loadData();
  renderAdminGames();
  showToast('Game deleted');
}

// ── Admin: Lineup ────────────────────────────────────────────────
function renderAdminLineup() {
  const el = document.getElementById('atab-lineup');
  if (!games.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">Add games first</div></div>';
    return;
  }
  const sorted = [...games].filter(g => g.status !== 'cancelled')
                           .sort((a,b) => a.game_date.localeCompare(b.game_date));
  let html = `<div class="form-group">
    <label class="form-label">Select Game</label>
    <select class="form-select" id="lineup-game-sel" onchange="renderLineupEditor()">
      <option value="">— pick a game —</option>
      ${sorted.map(g => `<option value="${g.id}">${fmtDateShort(g.game_date)} vs ${esc(g.opponent)}</option>`).join('')}
    </select>
  </div>
  <div id="lineup-editor"></div>`;
  el.innerHTML = html;
}

function renderLineupEditor() {
  const gameId = parseInt(document.getElementById('lineup-game-sel').value);
  const el = document.getElementById('lineup-editor');
  if (!gameId) { el.innerHTML = ''; return; }
  const gameLineup = lineups.filter(l => l.game_id === gameId)
                            .sort((a,b) => a.batting_order - b.batting_order);
  const SLOTS = 11;
  const activePlayers = players.filter(p => p.active);
  let html = `<div class="section-card" style="margin-top:4px;"><div class="section-header"><span class="sh-title">Batting Order</span></div><div style="padding:14px 16px;">`;
  for (let i = 1; i <= SLOTS; i++) {
    const spot = gameLineup.find(l => l.batting_order === i);
    html += `<div class="lineup-edit-row">
      <div class="lineup-edit-num">${i}</div>
      <select class="lineup-edit-sel" id="lu-player-${i}">
        <option value="">— open —</option>
        ${activePlayers.map(p => `<option value="${p.id}" ${spot && spot.player_id === p.id ? 'selected' : ''}>${esc(p.name)}${p.number ? ' #'+p.number : ''}</option>`).join('')}
      </select>
      <select class="lineup-edit-pos" id="lu-pos-${i}">
        <option value="">pos</option>
        ${POSITIONS.map(pos => `<option value="${pos}" ${spot && spot.position === pos ? 'selected' : ''}>${pos}</option>`).join('')}
      </select>
    </div>`;
  }
  html += `</div></div>
  <button class="btn btn-primary" onclick="saveLineup(${gameId})">Save Lineup</button>`;
  el.innerHTML = html;
}

async function saveLineup(gameId) {
  const SLOTS = 11;
  // Delete existing lineup for this game
  await sb.from('sb_lineups').delete().eq('game_id', gameId);
  const rows = [];
  for (let i = 1; i <= SLOTS; i++) {
    const playerId = document.getElementById('lu-player-' + i).value;
    const position = document.getElementById('lu-pos-' + i).value;
    if (playerId) rows.push({ game_id: gameId, player_id: parseInt(playerId), batting_order: i, position: position || null });
  }
  if (rows.length) await sb.from('sb_lineups').insert(rows);
  await loadData();
  showToast('Lineup saved');
}

// ── Admin: Settings ───────────────────────────────────────────────
function renderAdminSettings() {
  const el = document.getElementById('atab-settings');
  el.innerHTML = `<div class="card">
    <div class="card-label" style="margin-bottom:12px;">App Configuration</div>
    <button class="btn btn-outline" onclick="openModal('modal-settings')">⚙️ Edit Settings</button>
  </div>
  <div class="card">
    <div class="card-label" style="margin-bottom:8px;">Season Stats Reset</div>
    <div style="font-size:13px;color:var(--text-light);margin-bottom:12px;">Deletes ALL at-bat records for the season. Cannot be undone.</div>
    <button class="btn btn-red" onclick="resetStats()">Reset All Stats</button>
  </div>`;
}

function openModal(id) {
  if (id === 'modal-settings') {
    document.getElementById('cfg-team-name').value = config.team_name || '';
    document.getElementById('cfg-season').value = config.season || '';
    document.getElementById('cfg-admin-pin').value = config.admin_pin || '';
  }
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

async function saveSettings() {
  const teamName = document.getElementById('cfg-team-name').value.trim();
  const season = document.getElementById('cfg-season').value.trim();
  const adminPin = document.getElementById('cfg-admin-pin').value.trim();
  if (adminPin && (adminPin.length !== 4 || !/^\d{4}$/.test(adminPin))) {
    showToast('Admin PIN must be 4 digits'); return;
  }
  const updates = [
    { key: 'team_name', value: teamName || config.team_name },
    { key: 'season', value: season || config.season },
    { key: 'admin_pin', value: adminPin || config.admin_pin }
  ];
  for (const u of updates) {
    await sb.from('sb_config').upsert(u, { onConflict: 'key' });
  }
  closeModal('modal-settings');
  await loadData();
  document.getElementById('admin-team-name').textContent = config.team_name || 'MinuteMen';
  showToast('Settings saved');
}

async function resetStats() {
  if (!confirm('Delete ALL at-bat records for the season? This cannot be undone.')) return;
  if (!confirm('Are you absolutely sure? All stats will be permanently deleted.')) return;
  await sb.from('sb_at_bats').delete().neq('id', 0);
  await loadData();
  showToast('Stats reset');
}

// ── Utilities ────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

function fmtDateShort(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function daysDiff(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dt = new Date(d + 'T12:00:00');
  return Math.round((today - dt) / 86400000);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ── Boot ─────────────────────────────────────────────────────────
init();
</script>
